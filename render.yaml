# Render Deployment Configuration (Optional)
# This file allows for automatic configuration when deploying to Render
# Place this in the root directory of your repository

services:
  - type: web
    name: canteen-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        fromDatabase:
          name: canteen-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: false

  - type: pgsql
    name: canteen-db
    plan: free
    databaseName: canteen_db
    databaseUser: canteen_user
